name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.17.161
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/content-network
            git pull origin main
            cd content-network
            npm install --silent
            pm2 restart content-scheduler email-api
            echo "DEPLOY OK - $(date)"
